# ----- AI tools declaration (honest; not penalized) -----
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude for architecture design (judge-panel comparison of ranking approaches),
  code review, and documentation. All candidate scoring runs locally with no candidate
  data sent to any hosted LLM, and no network calls during the ranking step.

# ----- Approach summary (<= 200 words, recommended) -----
methodology_summary: |
  Transparent rule-engine ranker with a capped embedding/similarity recall layer.
  relevance_core combines career evidence (title taxonomy + product-vs-services company
  signal, with templated descriptions used only to corroborate), endorsement/duration/
  assessment-trusted skills, an experience band, Python/eval-framework signal, location/
  relocation fit, a capped JD-similarity term, and capped education. A behavioral
  availability multiplier (floor 0.55) down-weights inactive or unresponsive profiles and
  breaks behavioral twins. A conjunctive honeypot gate (>= 2 independent impossibility
  contradictions) keeps impossible profiles out of the top 100. Reasoning is generated
  deterministically from the same features that drive the rank, so it is specific, varied,
  rank-consistent, and free of hallucination. Runs CPU-only, no network, well under 5 minutes.

# ----- Declarations -----
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: false   # set true after testing the reproduce command on a clean checkout
